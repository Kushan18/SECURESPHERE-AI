services:
  scanner:
    type: web
    env: python
    rootDir: scanner
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

  backend:
    type: web
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

  frontend:
    type: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
